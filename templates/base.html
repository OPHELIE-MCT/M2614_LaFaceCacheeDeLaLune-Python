<!doctype html>
<html lang="en" data-bs-theme="light">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{{ page_title }} | M2614 Color Data Gather</title>
    <link rel="stylesheet" href="{{ request.url_for('static', path='vendor/bootstrap/bootstrap.min.css') }}">
    <link rel="stylesheet" href="{{ request.url_for('static', path='css/gather.css') }}">
</head>
<body>
    <main class="container py-4 py-lg-5">
        {% block content %}{% endblock %}
    </main>

    <div class="toast-container position-fixed bottom-0 end-0 p-3">
        <div id="gatherToast" class="toast align-items-center text-bg-dark border-0" role="status" aria-live="polite" aria-atomic="true">
            <div class="d-flex">
                <div class="toast-body">Action completed.</div>
                <button type="button" class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="toast" aria-label="Close"></button>
            </div>
        </div>
    </div>

    <script src="{{ request.url_for('static', path='vendor/bootstrap/bootstrap.bundle.min.js') }}"></script>
    <script src="{{ request.url_for('static', path='js/gather.js') }}"></script>
</body>
</html>
