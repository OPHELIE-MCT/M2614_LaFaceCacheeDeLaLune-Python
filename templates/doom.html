<!doctype html>
<html lang="en" data-bs-theme="dark">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="robots" content="noindex, nofollow, noarchive">
    <title>{{ page_title }} | M2614 Color Data Gather</title>
    <link rel="stylesheet" href="{{ request.url_for('static', path='vendor/bootstrap/bootstrap.min.css') }}">
    <link rel="stylesheet" href="{{ request.url_for('static', path='vendor/js-dos/js-dos.css') }}">
    <link rel="stylesheet" href="{{ request.url_for('static', path='css/doom.css') }}">
    <script type="module" src="{{ request.url_for('static', path='vendor/js-dos/js-dos.js') }}"></script>
</head>
<body class="doom-page">
    <div class="doom-shell">
        <header class="doom-toolbar">
            <div>
                <p class="doom-kicker mb-2">You found the hidden side of the Moon.</p>
                <h1 class="h3 mb-2">{{ page_title }}</h1>
                <p class="text-body-secondary mb-0">
                    Self-hosted DOOM shareware running entirely in your browser.
                </p>
            </div>
            <div class="d-flex gap-2">
                <button type="button" class="btn btn-outline-light" data-doom-fullscreen disabled>
                    Fullscreen
                </button>
                <button type="button" class="btn btn-outline-secondary" data-doom-restart>
                    Restart
                </button>
            </div>
        </header>

        <main class="doom-stage">
            <div class="doom-status" data-doom-status data-tone="loading">
                Loading js-dos runtime...
            </div>
            <div class="doom-player-frame">
                <div
                    id="doomPlayer"
                    class="doom-player"
                    data-doom-player
                    data-bundle-url="{{ request.url_for('static', path=doom_bundle_static_path) }}"
                    data-path-prefix="{{ request.url_for('static', path='vendor/js-dos/emulators') }}/"
                ></div>
            </div>
        </main>

        <footer class="doom-footer text-body-secondary">
            <span>Controls: arrows to move, Ctrl to fire, Space to open, Shift to run.</span>
            <span>Powered by js-dos and the original DOOM shareware episode.</span>
        </footer>
    </div>

    <script src="{{ request.url_for('static', path='js/doom.js') }}" defer></script>
</body>
</html>
