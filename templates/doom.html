<!doctype html>
<html lang="fr" data-bs-theme="dark">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="robots" content="noindex, nofollow, noarchive" />
    <title>{{ page_title }} | M2614 La face cachée de la lune</title>
    <link rel="stylesheet" href="{{ request.url_for('static', path='vendor/bootstrap/bootstrap.min.css') }}" />
    <link rel="stylesheet" href="{{ request.url_for('static', path='vendor/js-dos/js-dos.css') }}" />
    <link rel="stylesheet" href="{{ request.url_for('static', path='css/doom.css') }}" />
    <script type="module" src="{{ request.url_for('static', path='vendor/js-dos/js-dos.js') }}"></script>
  </head>
  <body class="doom-page">
    <div class="doom-shell">
      <header class="doom-toolbar">
        <div>
          <p class="doom-kicker mb-2">Vous avez trouvé la page secrète</p>
          <h1 class="h3 mb-2">{{ page_title }}</h1>
          <p class="text-body-secondary mb-0"></p>
        </div>
        <div class="d-flex gap-2">
          <button type="button" class="btn btn-outline-light" data-doom-fullscreen disabled>Plein écran</button>
          <button type="button" class="btn btn-outline-secondary" data-doom-restart>Redémarrer</button>
        </div>
      </header>

      <main class="doom-stage">
        <div class="doom-status" data-doom-status data-tone="loading">Chargement du jeu...</div>
        <div class="doom-player-frame">
          <div
            id="doomPlayer"
            class="doom-player"
            data-doom-player
            data-bundle-url="{{ request.url_for('static', path=doom_bundle_static_path) }}"
            data-path-prefix="{{ request.url_for('static', path='vendor/js-dos/emulators') }}/"
          ></div>
        </div>
      </main>

      <footer class="doom-footer text-body-secondary">
        <span>Contrôles : flèches ou WASD pour se déplacer, Ctrl pour tirer, Espace pour ouvrir, Maj pour courir.</span>
        <span>Powered by js-dos and the original DOOM shareware episode.</span>
      </footer>
    </div>

    <script src="{{ request.url_for('static', path='js/doom.js') }}" defer></script>
  </body>
</html>
